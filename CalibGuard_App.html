    // --- Utilities ---
    const TODAY_DATE = new Date('2026-07-18T11:47:24');

    function getDaysUntilDue(dateStr) {
      if (!dateStr) return 0;
      const parts = dateStr.split('-');
      if (parts.length === 3) {
        const dueDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
        return Math.ceil((dueDate.getTime() - TODAY_DATE.getTime()) / (1000 * 60 * 60 * 24));
      }
      return 0;
    }

    function getCalibrationAlertInfo(nextDueDate, thresholdDays = 7) {
      const days = getDaysUntilDue(nextDueDate);
      if (days < 0) return { key: 'overdue', label: `OVERDUE (${Math.abs(days)}d ago)`, shortLabel: 'Overdue', days, badgeClass: 'badge-red' };
      if (days <= thresholdDays) return { key: 'due-urgent', label: `DUE IN ${days} DAY${days === 1 ? '' : 'S'} (${thresholdDays}-Day Window)`, shortLabel: `Due in ${days}d`, days, badgeClass: 'badge-amber' };
      return { key: 'valid', label: `Compliant (${days} days left)`, shortLabel: 'Compliant', days, badgeClass: 'badge-green' };
    }

    function getNABLAgencyAlertInfo(nablDueDate, thresholdDays = 7) {
      const days = getDaysUntilDue(nablDueDate);
      if (days < 0) return { key: 'expired', label: `NABL ACCREDITATION EXPIRED (${Math.abs(days)}d ago)`, shortLabel: 'Expired', days, badgeClass: 'badge-red' };
      if (days <= thresholdDays) return { key: 'expiring-soon', label: `NABL SCOPE EXPIRING IN ${days} DAY${days === 1 ? '' : 'S'}`, shortLabel: `Expiring in ${days}d`, days, badgeClass: 'badge-amber' };
      return { key: 'valid', label: `NABL Accredited (${days} days valid)`, shortLabel: 'Valid', days, badgeClass: 'badge-green' };
    }

    // --- TIMEZONE-SAFE -1 DAY DUE DATE CALCULATOR ---
    function calculateNextDueDate(lastDateStr, months) {
      try {
        if (!lastDateStr) lastDateStr = '2026-01-22';
        const parts = lastDateStr.split('-');
        if (parts.length !== 3) return lastDateStr;

        let year = parseInt(parts[0], 10);
        let month = parseInt(parts[1], 10) - 1;
        let day = parseInt(parts[2], 10);

        const m = parseInt(months || 6, 10);

        const d = new Date(year, month + m, day);
        d.setDate(d.getDate() - 1); // MINUS 1 DAY RULE!

        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');

        return `${yyyy}-${mm}-${dd}`;
      } catch (e) {
        return lastDateStr;
      }
    }

    // --- ROBUST PARSER FOR DD/MM/YYYY, DD-MM-YYYY & EXCEL DATES ---
    function parseExcelDate(val) {
      if (!val) return '2026-01-22';

      if (val instanceof Date && !isNaN(val.getTime())) {
        const yyyy = val.getFullYear();
        const mm = String(val.getMonth() + 1).padStart(2, '0');
        const dd = String(val.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      }

      if (typeof val === 'number') {
        const dateObj = new Date((val - (25567 + 2)) * 86400 * 1000);
        if (!isNaN(dateObj.getTime())) {
          const yyyy = dateObj.getFullYear();
          const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
          const dd = String(dateObj.getDate()).padStart(2, '0');
          return `${yyyy}-${mm}-${dd}`;
        }
      }

      const str = val.toString().trim();
      const parts = str.split(/[\/\-\.]/);

      // Explicit DD/MM/YYYY or DD-MM-YYYY (Day/Month/Year standard)
      if (parts.length === 3 && parts[2].length === 4) {
        let p1 = parseInt(parts[0], 10);
        let p2 = parseInt(parts[1], 10);
        let y = parseInt(parts[2], 10);

        if (p1 > 12 && p2 <= 12) {
          return `${y}-${String(p2).padStart(2, '0')}-${String(p1).padStart(2, '0')}`;
        }
        if (p1 <= 31 && p2 <= 12) {
          return `${y}-${String(p2).padStart(2, '0')}-${String(p1).padStart(2, '0')}`;
        }
      }

      // Explicit YYYY-MM-DD
      if (parts.length === 3 && parts[0].length === 4) {
        let y = parseInt(parts[0], 10);
        let m = parseInt(parts[1], 10);
        let d = parseInt(parts[2], 10);
        return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
      }

      const parsed = new Date(str);
      if (!isNaN(parsed.getTime())) {
        const yyyy = parsed.getFullYear();
        const mm = String(parsed.getMonth() + 1).padStart(2, '0');
        const dd = String(parsed.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      }

      return '2026-01-22';
    }

    // --- STANDARD DD/MM/YYYY DISPLAY FORMATTER ---
    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const parts = dateStr.split('-');
      if (parts.length === 3) {
        const yyyy = parts[0];
        const mm = parts[1];
        const dd = parts[2];
        
        // Render as DD/MM/YYYY
        return `${dd}/${mm}/${yyyy}`;
      }
      return dateStr;
    }

    // --- SAFE STORAGE CONTROLLER ---
    const StorageManager = {
      get: (key, def) => { 
        try { 
          const currentVersion = localStorage.getItem('calibguard_data_ver');
          if (currentVersion !== DATA_VERSION) {
            localStorage.setItem('calibguard_data_ver', DATA_VERSION);
            if (key === 'instruments') {
              StorageManager.set('instruments', INITIAL_INSTRUMENTS);
              return INITIAL_INSTRUMENTS;
            }
          }

          const item = localStorage.getItem(`calibguard_${key}`); 
          if (item) {
            const parsed = JSON.parse(item);
            if (Array.isArray(parsed) && parsed.length > 0) {
              if (key === 'agencies') {
                return parsed.map(a => ({
                  id: a.id || `AGN-${Math.random()}`,
                  name: a.name || 'Calibration Laboratory',
                  code: a.code || 'LAB-001',
                  contactPerson: a.contactPerson || 'Laboratory Incharge',
                  phone: a.phone || '+1 (555) 000-0000',
                  email: a.email || 'info@caliblab.com',
                  accreditation: a.accreditation || 'ISO/IEC 17025 Accredited (NABL)',
                  nablCertNo: a.nablCertNo || 'NABL-CC-2894',
                  nablDueDate: a.nablDueDate || '2026-08-15',
                  nablScopeName: a.nablScopeName || null,
                  nablScopeData: a.nablScopeData || null,
                  status: a.status || 'Active'
                }));
              }
              if (key === 'instruments') {
                return parsed.map((ins, index) => {
                  let mappedCat = ins.category || 'Quality';
                  if (!ALLOWED_CATEGORIES.includes(mappedCat)) {
                    if (mappedCat.toLowerCase().includes('heat')) mappedCat = 'Heat Treatment';
                    else if (mappedCat.toLowerCase().includes('mpi')) mappedCat = 'MPI';
                    else if (mappedCat.toLowerCase().includes('prod')) mappedCat = 'Production';
                    else mappedCat = 'Quality';
                  }

                  const calDate = ins.lastCalibratedDate || '2026-01-22';
                  const freq = parseInt(ins.frequencyMonths || 6, 10);
                  const computedDue = calculateNextDueDate(calDate, freq);

                  return {
                    ...ins,
                    category: mappedCat,
                    lastCalibratedDate: calDate,
                    frequencyMonths: freq,
                    nextDueDate: computedDue
                  };
                });
              }
              return parsed;
            }
          }
          return def; 
        } catch (e) { 
          return def; 
        } 
      },
      set: (key, val) => { 
        try { 
          localStorage.setItem(`calibguard_${key}`, JSON.stringify(val)); 
        } catch (e) { 
          console.warn(`localStorage quota error, stripping binary attachments for ${key}`);
          try {
            const cleanVal = JSON.parse(JSON.stringify(val, (k, v) => (k === 'pdfReportData' || k === 'nablScopeData') ? null : v));
            localStorage.setItem(`calibguard_${key}`, JSON.stringify(cleanVal));
          } catch (err) {
            console.error('Storage failed', err);
          }
        } 
      }
    };

      // --- PERMISSION CHECK ENGINE ---
      hasPermission(action) {
        const user = this.getActiveUser();
        const isAdmin = (user.role === 'Admin' || user.username === 'Mukunda');
        
        if (isAdmin) return true;

        if (action === 'edit_instrument' || action === 'delete_instrument' || action === 'manage_users' || action === 'edit_user_access' || action === 'edit_agency' || action === 'reset_seed') {
          return false;
        }

        const p = user.permissions || {};

        if (p.accessLevel === 'view' || p.readOnlyMode) {
          if (action === 'view_dashboard' || action === 'view_master' || action === 'view_alerts' || action === 'view_agencies' || action === 'view_pdf' || action === 'export_backup') return true;
          return false;
        }

        if (action === 'add_instrument') return !!p.canAddInstruments;
        if (action === 'upload_excel') return !!p.canUploadExcel;
        if (action === 'upload_pdf') return !!p.canUploadPDF;

        return true;
      }

            if (data.agencies && Array.isArray(data.agencies)) {

              StorageManager.set('agencies', this.state.agencies);

            if (data.users && Array.isArray(data.users)) {
              this.state.users = data.users;
              StorageManager.set('users', this.state.users);

            showToast('ðŸ“¥ Database Backup (.json) Successfully Imported & Restored!');

      getFilteredInstruments() {
        const user = this.getActiveUser();
        const query = (this.state.searchQuery || '').toLowerCase().trim();
        const cat = this.state.filterCategory || 'All';
        const stat = this.state.filterStatus || 'All';
        const threshold = this.state.alertThresholdDays;

        return this.state.instruments.filter(ins => {
          if (user.role === 'AgencyRep' && user.assignedAgencyId) {
            if (ins.agencyId !== user.assignedAgencyId) return false;
          }

          const agency = this.state.agencies.find(a => a.id === ins.agencyId);
          const agencyName = agency ? agency.name.toLowerCase() : '';
          const agencyCode = agency ? agency.code.toLowerCase() : '';

          const calDateFormatted = formatDate(ins.lastCalibratedDate).toLowerCase();
          const dueDateFormatted = formatDate(ins.nextDueDate).toLowerCase();

          const matchesQuery = !query || 
            (ins.tagId && ins.tagId.toLowerCase().includes(query)) ||
            (ins.historyCardNo && ins.historyCardNo.toLowerCase().includes(query)) ||
            (ins.name && ins.name.toLowerCase().includes(query)) ||
            (ins.make && ins.make.toLowerCase().includes(query)) ||
            (ins.serialNo && ins.serialNo.toLowerCase().includes(query)) ||
            (ins.range && ins.range.toLowerCase().includes(query)) ||
            (ins.leastCount && ins.leastCount.toLowerCase().includes(query)) ||
            (ins.category && ins.category.toLowerCase().includes(query)) ||
            (ins.location && ins.location.toLowerCase().includes(query)) ||
            calDateFormatted.includes(query) ||
            dueDateFormatted.includes(query) ||
            agencyName.includes(query) ||
            agencyCode.includes(query);

          const matchesCat = (cat === 'All') || (ins.category === cat);

          const alertInfo = getCalibrationAlertInfo(ins.nextDueDate, threshold);
          const matchesStat = (stat === 'All') || 
            (stat === 'Overdue' && alertInfo.key === 'overdue') ||
            (stat === 'Urgent' && alertInfo.key === 'due-urgent') ||
            (stat === 'Compliant' && alertInfo.key === 'valid');

          return matchesQuery && matchesCat && matchesStat;
        });
      }

      // --- EXCEL UPLOAD PARSER (SUPPORTING DD/MM/YYYY FORMAT) ---
      handleExcelUpload(file) {
        if (!this.hasPermission('upload_excel')) {
          alert('Access Denied: Your account role does not have permission to upload Excel sheets.');
          return;
        }
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', cellDates: true });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const rawRows = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

            if (!rawRows || rawRows.length === 0) {
              alert('Uploaded Excel sheet is empty! Please check your file.');
              return;
            }

            const findValue = (row, patterns) => {
              const keys = Object.keys(row);
              for (let pattern of patterns) {
                const foundKey = keys.find(k => k.toString().toLowerCase().trim().replace(/[^a-z0-9]/g, '') === pattern);
                if (foundKey && row[foundKey] !== undefined && row[foundKey] !== null && row[foundKey] !== '') {
                  return row[foundKey];
                }
              }
              return '';
            };

            let updatedCount = 0;
            let addedCount = 0;
            const importedTags = [];

            rawRows.forEach((row, idx) => {
              const tagIdVal = findValue(row, ['tagid', 'tag', 'assetid', 'asset', 'tagassetid', 'tagno', 'equipmentid', 'equipmentno', 'eqid', 'eqno', 'gaugeid', 'gaugeno', 'id', 'code', 'assetno', 'tagasset']);
              const nameVal = findValue(row, ['instrumentname', 'name', 'instrument', 'description', 'gaugename', 'equipmentname', 'title', 'particulars', 'item', 'itemname', 'equipment']);
              
              if (!tagIdVal && !nameVal) return;

              const tagId = (tagIdVal || `EQ-IMP-${Date.now()}-${idx}`).toString().trim();
              const historyCardNo = (findValue(row, ['historycardno', 'historycard', 'historycardnum', 'historycardnumber', 'hcno', 'hcnumber', 'cardno', 'cardnumber', 'historyno', 'history', 'hcardno', 'hcard']) || `HC-2026-${(idx + 101)}`).toString().trim();
              const name = (nameVal || 'Measuring Instrument').toString().trim();
              const make = (findValue(row, ['make', 'makebrand', 'brand', 'manufacturer', 'company', 'mfr', 'makeofinstrument']) || 'Mitutoyo').toString().trim();
              const serialNo = (findValue(row, ['serialnumber', 'serialno', 'serial', 'slno', 'srno', 'sn', 'machineno', 'srnumber', 'slnumber', 'sno', 'serialnum']) || 'SN-000').toString().trim();
              const range = (findValue(row, ['range', 'capacity', 'specification', 'size', 'rangespecification', 'measuringrange']) || '0-150 mm').toString().trim();
              const leastCount = (findValue(row, ['leastcount', 'lc', 'resolution', 'accuracy', 'leastcountlc', 'lcount']) || '0.01 mm').toString().trim();
              
              let rawCategory = (findValue(row, ['category', 'type', 'discipline', 'dept', 'department', 'cat', 'process']) || 'Quality').toString().trim();
              let categoryVal = 'Quality';
              const catLower = rawCategory.toLowerCase();
              if (catLower.includes('mpi') || catLower.includes('magnetic') || catLower.includes('flaw') || catLower.includes('yoke') || catLower.includes('ultrasonic')) {
                categoryVal = 'MPI';
              } else if (catLower.includes('heat') || catLower.includes('furnace') || catLower.includes('temp') || catLower.includes('therm') || catLower.includes('oven') || catLower.includes('quench') || catLower.includes('anneal')) {
                categoryVal = 'Heat Treatment';
              } else if (catLower.includes('prod') || catLower.includes('press') || catLower.includes('line') || catLower.includes('forge') || catLower.includes('hydraul')) {
                categoryVal = 'Production';
              } else {
                categoryVal = 'Quality';
              }

              const location = (findValue(row, ['location', 'locationshop', 'shop', 'area', 'department', 'plant', 'locationdept', 'place', 'workstation', 'line']) || 'Quality Inspection Shop').toString().trim();
              
              // CALIBRATION ON DATE: Parsed cleanly from DD/MM/YYYY or DD-MM-YYYY Excel strings
              const rawCalDate = findValue(row, ['calibrationondate', 'calibrationdate', 'lastcalibrateddate', 'caldate', 'calibratedon', 'dateofcalibration', 'lastcalibrationdate', 'lastcaldate', 'calondate', 'date']);
              const lastCal = parseExcelDate(rawCalDate);

              // FREQUENCY
              const freqRaw = findValue(row, ['frequencymonths', 'frequency', 'freq', 'frequencyinmonths', 'periodicity', 'interval', 'months', 'calfrequency', 'calibfrequency']);
              const freq = parseInt(freqRaw || '6', 10);

              // AGENCY
              const agencyCodeVal = findValue(row, ['agencycode', 'agency', 'calibrationagency', 'lab', 'calibratedby', 'agencyname', 'supplier', 'vendor', 'callab', 'externalagency']);
              let agency = this.state.agencies.find(a => 
                a.code.toLowerCase() === agencyCodeVal.toString().toLowerCase() || 
                a.name.toLowerCase() === agencyCodeVal.toString().toLowerCase() ||
                a.name.toLowerCase().includes(agencyCodeVal.toString().toLowerCase())
              );
              if (!agency) agency = this.state.agencies[0];

              // DUE DATE: CALIBRATION DATE + FREQUENCY MONTHS - 1 DAY
              const nextDue = calculateNextDueDate(lastCal, freq);

              const existingIdx = this.state.instruments.findIndex(i => i.tagId.toLowerCase() === tagId.toLowerCase());

              if (existingIdx >= 0) {
                this.state.instruments[existingIdx] = {
                  ...this.state.instruments[existingIdx],
                  tagId: tagId,
                  historyCardNo: historyCardNo,
                  name: name,
                  make: make,
                  serialNo: serialNo,
                  range: range,
                  leastCount: leastCount,
                  category: categoryVal,
                  location: location,
                  frequencyMonths: freq,
                  lastCalibratedDate: lastCal,
                  nextDueDate: nextDue,
                  agencyId: agency.id
                };
                updatedCount++;
                importedTags.push(`${tagId} (${name}) - Calib: ${formatDate(lastCal)} âž” Due: ${formatDate(nextDue)}`);
              } else {
                this.state.instruments.unshift({
                  id: `INS-${Date.now()}-${idx}`,
                  tagId: tagId,
                  historyCardNo: historyCardNo,
                  name: name,
                  make: make,
                  serialNo: serialNo,
                  range: range,
                  leastCount: leastCount,
                  category: categoryVal,
                  location: location,
                  frequencyMonths: freq,
                  lastCalibratedDate: lastCal,
                  nextDueDate: nextDue,
                  agencyId: agency.id,
                  status: 'Active',
                  pdfReportName: null
                });
                addedCount++;
                importedTags.push(`${tagId} (${name}) - Calib: ${formatDate(lastCal)} âž” Due: ${formatDate(nextDue)}`);
              }
            });

            this.saveState('instruments');
            this.openExcelUploadResultModal(updatedCount, addedCount, importedTags);
            this.renderCurrentTab();
          } catch (err) {
            alert('Error parsing Excel sheet: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }

        document.getElementById('newUserForm').addEventListener('submit', (e) => {
          e.preventDefault();

          const accessLevel = document.getElementById('uAccessLevel').value;
          const isView = (accessLevel === 'view');
          const isAdmin = (accessLevel === 'admin');

          this.state.users.push({
            id: `USR-${Date.now()}`, 
            name: document.getElementById('uName').value.trim(),
            username: document.getElementById('uUsername').value.trim(), 
            password: document.getElementById('uPassword').value.trim(),
            email: document.getElementById('uEmail').value.trim(), 
            role: isAdmin ? 'Admin' : (isView ? 'Auditor' : 'Technician'),
            department: 'Metrology Dept', 
            avatar: 'MK',
            permissions: {
              accessLevel: accessLevel,
              canAddInstruments: !isView,
              canEditInstruments: isAdmin,
              canDeleteInstruments: isAdmin,
              canUploadExcel: !isView,
              canUploadPDF: !isView,
              canEditAgencies: isAdmin,
              canManageUsers: isAdmin,
              readOnlyMode: isView
            }
          });

          this.saveState('users');
          showToast(`ðŸ’¾ User Account ${document.getElementById('uUsername').value} Created & Saved!`);
          m.classList.add('hidden');
          this.renderCurrentTab();
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => { window.app = new CalibGuardApp(); });
  </script>
</body>
</html>

    const TODAY_DATE = new Date('2026-07-18T11:47:24');

    function getDaysUntilDue(dateStr) {
      if (!dateStr) return 0;
      const dueDate = new Date(dateStr);
      if (isNaN(dueDate.getTime())) return 0;
      return Math.ceil((dueDate.getTime() - TODAY_DATE.getTime()) / (1000 * 60 * 60 * 24));
    }

    function getCalibrationAlertInfo(nextDueDate, thresholdDays = 7) {
      const days = getDaysUntilDue(nextDueDate);
      if (days < 0) return { key: 'overdue', label: `OVERDUE (${Math.abs(days)}d ago)`, shortLabel: 'Overdue', days, badgeClass: 'badge-red' };
      if (days <= thresholdDays) return { key: 'due-urgent', label: `DUE IN ${days} DAY${days === 1 ? '' : 'S'} (${thresholdDays}-Day Window)`, shortLabel: `Due in ${days}d`, days, badgeClass: 'badge-amber' };
      return { key: 'valid', label: `Compliant (${days} days left)`, shortLabel: 'Compliant', days, badgeClass: 'badge-green' };
    }

    function getNABLAgencyAlertInfo(nablDueDate, thresholdDays = 7) {
      const days = getDaysUntilDue(nablDueDate);
      if (days < 0) return { key: 'expired', label: `NABL ACCREDITATION EXPIRED (${Math.abs(days)}d ago)`, shortLabel: 'Expired', days, badgeClass: 'badge-red' };
      if (days <= thresholdDays) return { key: 'expiring-soon', label: `NABL SCOPE EXPIRING IN ${days} DAY${days === 1 ? '' : 'S'}`, shortLabel: `Expiring in ${days}d`, days, badgeClass: 'badge-amber' };
      return { key: 'valid', label: `NABL Accredited (${days} days valid)`, shortLabel: 'Valid', days, badgeClass: 'badge-green' };
    }

    function calculateNextDueDate(lastDateStr, months) {
      try {
        if (!lastDateStr) {
          const defaultDate = new Date(TODAY_DATE);
          defaultDate.setMonth(defaultDate.getMonth() + parseInt(months || 6, 10));
          return defaultDate.toISOString().split('T')[0];
        }
        const date = new Date(lastDateStr);
        if (isNaN(date.getTime())) {
          const fallbackDate = new Date(TODAY_DATE);
          fallbackDate.setMonth(fallbackDate.getMonth() + parseInt(months || 6, 10));
          return fallbackDate.toISOString().split('T')[0];
        }
        date.setMonth(date.getMonth() + parseInt(months || 6, 10));
        return date.toISOString().split('T')[0];
      } catch (e) {
        return '2026-07-18';
      }
    }

    function parseExcelDate(val) {
      if (!val) return '2026-01-18';
      if (val instanceof Date && !isNaN(val.getTime())) {
        return val.toISOString().split('T')[0];
      }
      if (typeof val === 'number') {
        const dateObj = new Date((val - (25567 + 2)) * 86400 * 1000);
        if (!isNaN(dateObj.getTime())) return dateObj.toISOString().split('T')[0];
      }
      const str = val.toString().trim();
      const parsed = new Date(str);
      if (!isNaN(parsed.getTime())) return parsed.toISOString().split('T')[0];

      const parts = str.split(/[\/\-\.]/);
      if (parts.length === 3) {
        if (parts[2].length === 4) {
          const d1 = parseInt(parts[0], 10);
          const d2 = parseInt(parts[1], 10);
          const y = parseInt(parts[2], 10);
          if (d1 > 12) {
            const dateObj = new Date(y, d2 - 1, d1);
            if (!isNaN(dateObj.getTime())) return dateObj.toISOString().split('T')[0];
          } else {
            const dateObj = new Date(y, d1 - 1, d2);
            if (!isNaN(dateObj.getTime())) return dateObj.toISOString().split('T')[0];
          }
        }
      }
      return '2026-01-18';
    }

    function formatDate(dateStr) {
      if (!dateStr) return 'N/A';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return 'N/A';
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

              }
              return parsed;
            }
          }
          return def; 
        } catch (e) { 
          return def; 
        }

      set: (key, val) => { 
        try { 
          localStorage.setItem(`calibguard_${key}`, JSON.stringify(val)); 
        } catch (e) { 
          console.warn(`localStorage quota error, stripping binary attachments for ${key}`);
          try {
            const cleanVal = JSON.parse(JSON.stringify(val, (k, v) => (k === 'pdfReportData' || k === 'nablScopeData') ? null : v));
            localStorage.setItem(`calibguard_${key}`, JSON.stringify(cleanVal));
          } catch (err) {
            console.error('Storage failed', err);
          }
        } 
      }
    };

          activeTab: 'master',

          filterStatus: 'All'

        this.init();
      }

      init() {
        if (!this.state.isLoggedIn) {
          this.renderLoginScreen();
        } else {
          this.renderMainApp();
        }
      }

      getActiveUser() {
        return this.state.users.find(u => u.id === this.state.activeUserId) || this.state.users[0];
      }

      // --- PERMISSION CHECK ENGINE ---
      hasPermission(action) {
        const user = this.getActiveUser();
        
        // Admin user Mukunda has FULL ACCESS to everything!
        if (user.role === 'Admin' || user.username === 'Mukunda') return true;

        const p = user.permissions || {
          accessLevel: "modification",
          canAddInstruments: true,
          canEditInstruments: true,
          canDeleteInstruments: false,
          canUploadExcel: false,
          canUploadPDF: true,
          canEditAgencies: false,
          canManageUsers: false,
          readOnlyMode: false
        };

        if (action === 'manage_users' || action === 'edit_user_access') {
          return false;
        }

        if (p.accessLevel === 'view' || p.readOnlyMode) {
          if (action === 'view_dashboard' || action === 'view_master' || action === 'view_alerts' || action === 'view_agencies' || action === 'view_pdf' || action === 'export_backup') return true;
          return false;
        }

        if (action === 'add_instrument') return !!p.canAddInstruments;
        if (action === 'edit_instrument') return !!p.canEditInstruments;
        if (action === 'delete_instrument') return !!p.canDeleteInstruments;
        if (action === 'upload_excel') return !!p.canUploadExcel;
        if (action === 'upload_pdf') return !!p.canUploadPDF;
        if (action === 'edit_agency') return !!p.canEditAgencies;
        if (action === 'reset_seed') return false;

        return true;
      }

      saveState(k, showToastMsg = true) {
        StorageManager.set(k, this.state[k]);
        if (showToastMsg) showToast(`✅ Data Saved to Browser Storage!`);
      }

      saveAllData() {
        StorageManager.set('instruments', this.state.instruments);
        StorageManager.set('agencies', this.state.agencies);
        StorageManager.set('users', this.state.users);
        StorageManager.set('alertThresholdDays', this.state.alertThresholdDays);
        showToast('💾 All Master Data & Calibration Agencies Saved Successfully!');
      }

      exportBackupJSON() {
        const backupData = {
          version: "2026.07.21.v2",
          exportDate: new Date().toISOString(),
          instruments: this.state.instruments,
          agencies: this.state.agencies,
          users: this.state.users,
          alertThresholdDays: this.state.alertThresholdDays
        };

        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backupData, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `CalibGuard_Database_Backup_${new Date().toISOString().split('T')[0]}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
        showToast('💾 Database Backup (.json) Exported Successfully!');
      }

      importBackupJSON(file) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            if (data.instruments && Array.isArray(data.instruments)) {
              this.state.instruments = data.instruments;
              StorageManager.set('instruments', this.state.instruments);
            }
            if (data.agencies && Array.isArray(data.agencies)) {
              this.state.agencies = data.agencies;
              StorageManager.set('agencies', this.state.agencies);
            }
            if (data.users && Array.isArray(data.users)) {
              this.state.users = data.users;
              StorageManager.set('users', this.state.users);
            }
            showToast('📥 Database Backup (.json) Successfully Imported & Restored!');
            this.renderCurrentTab();
          } catch (err) {
            alert('Error parsing database backup JSON file: ' + err.message);
          }
        };
        reader.readAsText(file);
      }

          this.state.agencies = INITIAL_AGENCIES;
          this.state.users = INITIAL_USERS;
          this.saveAllData();

      getFilteredInstruments() {
        const user = this.getActiveUser();
        const query = (this.state.searchQuery || '').toLowerCase().trim();
        const cat = this.state.filterCategory || 'All';
        const stat = this.state.filterStatus || 'All';
        const threshold = this.state.alertThresholdDays;

        return this.state.instruments.filter(ins => {
          if (user.role === 'AgencyRep' && user.assignedAgencyId) {
            if (ins.agencyId !== user.assignedAgencyId) return false;
          }

          const agency = this.state.agencies.find(a => a.id === ins.agencyId);
          const agencyName = agency ? agency.name.toLowerCase() : '';
          const agencyCode = agency ? agency.code.toLowerCase() : '';

          const matchesQuery = !query || 
            ins.tagId.toLowerCase().includes(query) ||
            ins.name.toLowerCase().includes(query) ||
            (ins.make && ins.make.toLowerCase().includes(query)) ||
            (ins.serialNo && ins.serialNo.toLowerCase().includes(query)) ||
            (ins.range && ins.range.toLowerCase().includes(query)) ||
            (ins.leastCount && ins.leastCount.toLowerCase().includes(query)) ||
            (ins.location && ins.location.toLowerCase().includes(query)) ||
            agencyName.includes(query) ||
            agencyCode.includes(query);

          const matchesCat = (cat === 'All') || (ins.category === cat);

          const alertInfo = getCalibrationAlertInfo(ins.nextDueDate, threshold);
          const matchesStat = (stat === 'All') || 
            (stat === 'Overdue' && alertInfo.key === 'overdue') ||
            (stat === 'Urgent' && alertInfo.key === 'due-urgent') ||
            (stat === 'Compliant' && alertInfo.key === 'valid');

          return matchesQuery && matchesCat && matchesStat;
        });
      }

      handleExcelUpload(file) {
        if (!this.hasPermission('upload_excel')) {
          alert('Access Denied: Your account role does not have permission to upload Excel sheets.');
          return;
        }
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', cellDates: true });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            const rawRows = XLSX.utils.sheet_to_json(worksheet, { defval: '' });

            if (!rawRows || rawRows.length === 0) {
              alert('Uploaded Excel sheet is empty! Please check your file.');
              return;
            }

            const findValue = (row, patterns) => {
              const keys = Object.keys(row);
              for (let pattern of patterns) {
                const foundKey = keys.find(k => k.toString().toLowerCase().trim().replace(/[^a-z0-9]/g, '') === pattern);
                if (foundKey && row[foundKey] !== undefined && row[foundKey] !== null && row[foundKey] !== '') {
                  return row[foundKey];
                }
              }
              return '';
            };

            let updatedCount = 0;
            let addedCount = 0;
            const importedTags = [];

            rawRows.forEach((row, idx) => {
              const tagIdVal = findValue(row, ['tagid', 'tag', 'assetid', 'asset', 'tagassetid', 'tagno', 'equipmentid', 'gaugeid', 'id', 'slno', 'srno', 'sno', 'code', 'serial']);
              const nameVal = findValue(row, ['instrumentname', 'name', 'instrument', 'description', 'gaugename', 'equipmentname', 'title', 'particulars', 'item']);
              
              if (!tagIdVal && !nameVal) return;

              const tagId = (tagIdVal || `EQ-IMP-${Date.now()}-${idx}`).toString().trim();
              const name = (nameVal || 'Measuring Instrument').toString().trim();
              const make = (findValue(row, ['make', 'brand', 'manufacturer', 'company', 'mfr']) || 'Mitutoyo').toString().trim();
              const serialNo = (findValue(row, ['serialnumber', 'serialno', 'serial', 'slno', 'srno', 'sn', 'machineno']) || 'SN-000').toString().trim();
              const range = (findValue(row, ['range', 'capacity', 'specification', 'size']) || '0-150 mm').toString().trim();
              const leastCount = (findValue(row, ['leastcount', 'lc', 'resolution', 'accuracy']) || '0.01 mm').toString().trim();
              const category = (findValue(row, ['category', 'type', 'discipline', 'dept']) || 'Dimensional').toString().trim();
              const location = (findValue(row, ['location', 'shop', 'area', 'department', 'plant', 'locationdept']) || 'Quality Inspection Shop').toString().trim();
              
              const rawCalDate = findValue(row, ['calibrationondate', 'calibrationdate', 'lastcalibrateddate', 'caldate', 'calibratedon', 'dateofcalibration', 'caldate']);
              const lastCal = parseExcelDate(rawCalDate);

              const freqRaw = findValue(row, ['frequencymonths', 'frequency', 'freq', 'frequencyinmonths', 'periodicity', 'interval', 'months']);
              const freq = parseInt(freqRaw || '6', 10);

              const agencyCodeVal = findValue(row, ['agencycode', 'agency', 'calibrationagency', 'lab', 'calibratedby']);
              let agency = this.state.agencies.find(a => 
                a.code.toLowerCase() === agencyCodeVal.toString().toLowerCase() || 
                a.name.toLowerCase() === agencyCodeVal.toString().toLowerCase()
              );
              if (!agency) agency = this.state.agencies[0];

              const nextDue = calculateNextDueDate(lastCal, freq);

              const existingIdx = this.state.instruments.findIndex(i => i.tagId.toLowerCase() === tagId.toLowerCase());

              if (existingIdx >= 0) {
                this.state.instruments[existingIdx] = {
                  ...this.state.instruments[existingIdx],
                  tagId: tagId,
                  name: name,
                  make, serialNo, range, leastCount, category, location,
                  frequencyMonths: freq,
                  lastCalibratedDate: lastCal,
                  nextDueDate: nextDue,
                  agencyId: agency.id
                };
                updatedCount++;
                importedTags.push(`${tagId} (${name}) - Updated`);
              } else {
                this.state.instruments.unshift({
                  id: `INS-${Date.now()}-${idx}`,
                  tagId: tagId,
                  name: name,
                  make, serialNo, range, leastCount, category, location,
                  frequencyMonths: freq,
                  lastCalibratedDate: lastCal,
                  nextDueDate: nextDue,
                  agencyId: agency.id,
                  status: 'Active',
                  pdfReportName: null
                });
                addedCount++;
                importedTags.push(`${tagId} (${name}) - Added`);
              }
            });

            this.saveState('instruments');
            this.openExcelUploadResultModal(updatedCount, addedCount, importedTags);
            this.renderCurrentTab();
          } catch (err) {
            alert('Error parsing Excel sheet: ' + err.message);
          }
        };
        reader.readAsArrayBuffer(file);
      }

            const agencyId = e.currentTarget.dataset.agencyId;
            this.openEditAgencyModal(agencyId);

            currentAgencyId = e.currentTarget.dataset.agencyId;

          const file = e.target.files[0];
          if (!file || !currentAgencyId) return;

          const reader = new FileReader();
          reader.onload = (evt) => {
            const agency = this.state.agencies.find(a => a.id === currentAgencyId);
            if (agency) {
              agency.nablScopeName = file.name;
              agency.nablScopeData = evt.target.result;
              this.saveState('agencies');
              showToast(`📜 NABL Scope Report "${file.name}" uploaded for ${agency.name}!`);

          reader.readAsDataURL(file);

        c.innerHTML = `

            <div>

            password: document.getElementById('uPassword').value.trim(),
            email: document.getElementById('uEmail').value.trim(), 
            role: isAdmin ? 'Admin' : (isView ? 'Auditor' : 'Technician'),
            department: 'Metrology Dept', 
            avatar: 'MK',
            permissions: {
              accessLevel: accessLevel,
              canAddInstruments: !isView,
              canEditInstruments: !isView,
              canDeleteInstruments: isAdmin,
              canUploadExcel: !isView,
              canUploadPDF: !isView,
              canEditAgencies: isAdmin,
              canManageUsers: isAdmin,
              readOnlyMode: isView
            }
          });

          this.saveState('users');
          showToast(`💾 User Account ${document.getElementById('uUsername').value} Created & Saved!`);
          m.classList.add('hidden');
          this.renderCurrentTab();
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => { window.app = new CalibGuardApp(); });
  </script>
</body>
</html>

    const TODAY_DATE = new Date('2026-07-18T11:47:24');

    function getDaysUntilDue(dateStr) {
      if (!dateStr) return 0;
      const dueDate = new Date(dateStr);
      if (isNaN(dueDate.getTime())) return 0;
      return Math.ceil((dueDate.getTime() - TODAY_DATE.getTime()) / (1000 * 60 * 60 * 24));
    }

    function getCalibrationAlertInfo(nextDueDate, thresholdDays = 7) {
      const days = getDaysUntilDue(nextDueDate);
      if (days < 0) return { key: 'overdue', label: `OVERDUE (${Math.abs(days)}d ago)`, shortLabel: 'Overdue', days, badgeClass: 'badge-red' };
      if (days <= thresholdDays) return { key: 'due-urgent', label: `DUE IN ${days} DAY${days === 1 ? '' : 'S'} (${thresholdDays}-Day Window)`, shortLabel: `Due in ${days}d`, days, badgeClass: 'badge-amber' };
      return { key: 'valid', label: `Compliant (${days} days left)`, shortLabel: 'Compliant', days, badgeClass: 'badge-green' };
    }

    function getNABLAgencyAlertInfo(nablDueDate, thresholdDays = 7) {
      const days = getDaysUntilDue(nablDueDate);
      if (days < 0) return { key: 'expired', label: `NABL ACCREDITATION EXPIRED (${Math.abs(days)}d ago)`, shortLabel: 'Expired', days, badgeClass: 'badge-red' };

      return { key: 'valid', label: `NABL Accredited (${days} days valid)`, shortLabel: 'Valid', days, badgeClass: 'badge-green' };
    }

    // --- BULLETPROOF SAFE DATE CALCULATOR ---
    function calculateNextDueDate(lastDateStr, months) {
      try {
        if (!lastDateStr) {
          const defaultDate = new Date(TODAY_DATE);
          defaultDate.setMonth(defaultDate.getMonth() + parseInt(months || 6, 10));
          return defaultDate.toISOString().split('T')[0];
        }
        const date = new Date(lastDateStr);
        if (isNaN(date.getTime())) {
          const fallbackDate = new Date(TODAY_DATE);
          fallbackDate.setMonth(fallbackDate.getMonth() + parseInt(months || 6, 10));
          return fallbackDate.toISOString().split('T')[0];
        }
        date.setMonth(date.getMonth() + parseInt(months || 6, 10));
        return date.toISOString().split('T')[0];
      } catch (e) {
        return '2026-07-18';
      }
    }

    function formatDate(dateStr) {

      if (isNaN(d.getTime())) return 'N/A';
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function exportToCSV(filename, rows) {
      if (!rows || !rows.length) return;
      const separator = ',';
      const keys = Object.keys(rows[0]);
      const csvContent = keys.join(separator) + '\n' + rows.map(row => keys.map(k => {
        let cell = row[k] === null || row[k] === undefined ? '' : row[k];
        cell = cell.toString().replace(/"/g, '""');
        return cell.search(/("|,|\n)/g) >= 0 ? `"${cell}"` : cell;
      }).join(separator)).join('\n');

      const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
    }

    function parseCSV(text) {
      const lines = text.split(/\r\n|\n/).filter(line => line.trim() !== '');
      if (lines.length < 2) return [];
      const headers = lines[0].split(',').map(h => h.trim().replace(/^"(.*)"$/, '$1'));
      const results = [];
      for (let i = 1; i < lines.length; i++) {
        const row = lines[i].split(',').map(c => c.trim().replace(/^"(.*)"$/, '$1'));
        if (row.length === headers.length) {
          const obj = {};
          headers.forEach((h, idx) => obj[h] = row[idx]);
          results.push(obj);
        }
      }
      return results;
    }

      bindEvents() {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.addEventListener('click', (e) => this.switchTab(e.currentTarget.dataset.tab)));
        document.getElementById('quickAlertBtn')?.addEventListener('click', () => this.switchTab('alerts'));
        document.getElementById('btnHeaderSaveAll')?.addEventListener('click', () => this.saveAllData());

        document.getElementById('globalThresholdSelect')?.addEventListener('change', (e) => {
          this.state.alertThresholdDays = parseInt(e.target.value, 10);
          this.saveState('alertThresholdDays');
          this.updateGlobalBadges();
          this.renderCurrentTab();
        });

        document.getElementById('btnLogout')?.addEventListener('click', () => {
          this.state.isLoggedIn = false;
          this.saveState('isLoggedIn', false);
          this.renderLoginScreen();
        });

        const fileInput = document.getElementById('excelFileInput');
        document.getElementById('btnTriggerExcelUpload')?.addEventListener('click', () => fileInput.click());
        document.getElementById('btnDownloadTemplate')?.addEventListener('click', () => downloadCSVTemplate());

        fileInput?.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (evt) => {
            const rows = parseCSV(evt.target.result);
            if (rows.length > 0) {
              let added = 0;
              rows.forEach(r => {
                if (r.TagID && r.Name) {
                  const freq = parseInt(r.FrequencyMonths || '6', 10);
                  const lastCal = r.LastCalibratedDate || '2026-01-01';
                  let agency = this.state.agencies.find(a => a.code === r.AgencyCode) || this.state.agencies[0];
                  this.state.instruments.unshift({
                    id: `INS-${Date.now()}-${Math.floor(Math.random()*1000)}`,
                    tagId: r.TagID, name: r.Name, make: r.Make || 'Mitutoyo',
                    serialNo: r.SerialNumber || 'SN-000', range: r.Range || '0-150 mm',
                    leastCount: r.LeastCount || '0.01 mm', category: r.Category || 'Dimensional',
                    location: r.Location || 'Plant Shop', frequencyMonths: freq, lastCalibratedDate: lastCal,
                    nextDueDate: calculateNextDueDate(lastCal, freq), agencyId: agency ? agency.id : 'AGN-001', status: 'Active',
                    pdfReportName: null, pdfReportData: null
                  });
                  added++;
                }
              });
              this.saveState('instruments');
              showToast(`📁 ${added} Instruments imported & auto-saved!`);
              this.renderCurrentTab();
            }
          };
          reader.readAsText(file);
        });
      }

      updateGlobalBadges() {
        const threshold = this.state.alertThresholdDays;
        const dueUrgentCount = this.state.instruments.filter(i => { const d = getDaysUntilDue(i.nextDueDate); return d >= 0 && d <= threshold; }).length;
        const overdueCount = this.state.instruments.filter(i => getDaysUntilDue(i.nextDueDate) < 0).length;
        const nablAlertCount = this.state.agencies.filter(a => { const d = getDaysUntilDue(a.nablDueDate); return d <= threshold; }).length;

        const total = dueUrgentCount + overdueCount + nablAlertCount;
        const badge = document.getElementById('urgentAlertCountBadge');
        if (badge) badge.innerText = total;
      }

      switchTab(tab) {
        this.state.activeTab = tab;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('nav-tab-active', b.dataset.tab === tab));
        this.renderCurrentTab();
      }

      renderCurrentTab() {
        const c = document.getElementById('tabContent');
        c.innerHTML = '';
        if (this.state.activeTab === 'master') this.renderMasterList(c);
        else if (this.state.activeTab === 'alerts') this.renderAlerts(c);
        else if (this.state.activeTab === 'agencies') this.renderAgencies(c);
        else if (this.state.activeTab === 'users') this.renderUsers(c);
        else this.renderDashboard(c);
        this.updateGlobalBadges();
      }

          btn.addEventListener('click', (e) => {
            const agencyId = e.currentTarget.dataset.agencyId;
            this.openNABLScopeViewer(agencyId);
          });
        });

        const nablInput = document.getElementById('nablScopeFileInput');
        let currentAgencyId = null;

        c.querySelectorAll('.btnUploadNABLScope').forEach(btn => {
          btn.addEventListener('click', (e) => {
            currentAgencyId = e.currentTarget.dataset.agencyId;
            nablInput.click();
          });
        });

        nablInput.onchange = (e) => {
          const file = e.target.files[0];
          if (!file || !currentAgencyId) return;

          const reader = new FileReader();
          reader.onload = (evt) => {
            const agency = this.state.agencies.find(a => a.id === currentAgencyId);
            if (agency) {
              agency.nablScopeName = file.name;
              agency.nablScopeData = evt.target.result;
              this.saveState('agencies');
              showToast(`📜 NABL Scope Report "${file.name}" uploaded for ${agency.name}!`);
              this.renderCurrentTab();
            }
          };
          reader.readAsDataURL(file);
        };

        c.querySelectorAll('.btnDeleteAgency').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.currentTarget.dataset.agencyId;
            if (confirm(`Delete agency?`)) {
              this.state.agencies = this.state.agencies.filter(a => a.id !== id);
              this.saveState('agencies');
              this.renderCurrentTab();
            }
          });
        });
      }

                  <div class="font-bold text-sky-700 text-base">${u.name}</div>
                  <div class="text-xs text-slate-700">Username: <code class="text-sky-800 font-mono font-bold">${u.username}</code></div>
                  <div class="text-xs text-slate-600">Role: <strong class="text-slate-900">${u.role}</strong></div>
                  <div class="pt-2 border-t border-slate-200 flex justify-end">
                    <button class="btnDeleteUser px-3 py-1 rounded-lg bg-red-50 text-red-700 border border-red-200 text-xs font-semibold hover:bg-red-100" data-user-id="${u.id}">🗑️ Delete User</button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        c.querySelector('#btnAddUser')?.addEventListener('click', () => this.openAddUserModal());
        c.querySelectorAll('.btnDeleteUser').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = e.currentTarget.dataset.userId;
            if (confirm(`Delete user?`)) {
              this.state.users = this.state.users.filter(u => u.id !== id);
              this.saveState('users');
              this.renderCurrentTab();
            }
          });
        });
      }

      openAddUserModal() {
        const m = document.getElementById('modalContainer');
        m.classList.remove('hidden');
        m.innerHTML = `
          <div class="white-card modal-enter w-full max-w-md rounded-2xl p-6 border border-slate-200 space-y-4 bg-white shadow-2xl">
            <h3 class="font-bold text-lg text-slate-900">Add System User</h3>
            <form id="newUserForm" class="space-y-3 text-xs">
              <input type="text" id="uName" placeholder="Full Name" class="white-input w-full p-2.5 rounded-xl" required>
              <div class="grid grid-cols-2 gap-2">
                <input type="text" id="uUsername" placeholder="Username" class="white-input w-full p-2.5 rounded-xl font-mono" required>
                <input type="password" id="uPassword" placeholder="Password" class="white-input w-full p-2.5 rounded-xl font-mono" required>
              </div>
              <input type="email" id="uEmail" placeholder="Email" class="white-input w-full p-2.5 rounded-xl" required>
              <select id="uRole" class="white-input w-full p-2.5 rounded-xl">
                <option value="Admin">Admin</option>
                <option value="Technician">Technician</option>
                <option value="AgencyRep">Agency Representative</option>
                <option value="Auditor">Auditor</option>
              </select>
              <div class="flex justify-end space-x-2 pt-2">
                <button type="button" onclick="document.getElementById('modalContainer').classList.add('hidden')" class="px-4 py-2 rounded-xl bg-slate-100 text-slate-700 border border-slate-200">Cancel</button>
                <button type="submit" class="px-4 py-2 rounded-xl bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs shadow-md">💾 Save User</button>
              </div>
            </form>
          </div>
        `;
        document.getElementById('newUserForm').addEventListener('submit', (e) => {
          e.preventDefault();
          this.state.users.push({
            id: `USR-${Date.now()}`, name: document.getElementById('uName').value,
            username: document.getElementById('uUsername').value, password: document.getElementById('uPassword').value,
            email: document.getElementById('uEmail').value, role: document.getElementById('uRole').value,
            department: 'Metrology Dept', avatar: 'MK'
          });
          this.saveState('users');
          showToast(`💾 User ${document.getElementById('uUsername').value} Saved!`);
          m.classList.add('hidden');
          this.renderCurrentTab();
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => { window.app = new CalibGuardApp(); });
  </script>
</body>
</html>

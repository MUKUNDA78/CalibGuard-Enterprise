<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CalibGuard Enterprise | Calibration System</title>
  
  <!-- Tailwind CSS & Lucide Icons CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap">

  <style>
    :root {
      --bg-dark: #080C14;
      --bg-card: rgba(15, 23, 42, 0.85);
      --border-glass: rgba(255, 255, 255, 0.08);
      --border-highlight: rgba(56, 189, 248, 0.3);
    }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(at 10% 10%, rgba(56, 189, 248, 0.08) 0px, transparent 50%),
        radial-gradient(at 90% 80%, rgba(251, 191, 36, 0.06) 0px, transparent 50%),
        radial-gradient(at 50% 50%, rgba(52, 211, 153, 0.05) 0px, transparent 50%);
      background-attachment: fixed;
      color: #f1f5f9;
      min-height: 100vh;
    }
    .glass-panel {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-glass);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    .glass-input {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: #f8fafc;
    }
    .glass-input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
    }
    .badge-glow-amber {
      box-shadow: 0 0 15px rgba(251, 191, 36, 0.35);
      animation: pulse-amber 2s infinite ease-in-out;
    }
    .badge-glow-red {
      box-shadow: 0 0 18px rgba(248, 113, 113, 0.45);
      animation: pulse-red 1.5s infinite ease-in-out;
    }
    @keyframes pulse-amber {
      0%, 100% { box-shadow: 0 0 10px rgba(251, 191, 36, 0.3); }
      50% { box-shadow: 0 0 22px rgba(251, 191, 36, 0.65); }
    }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 10px rgba(248, 113, 113, 0.3); }
      50% { box-shadow: 0 0 25px rgba(248, 113, 113, 0.8); }
    }
    .nav-tab-active {
      background: linear-gradient(135deg, rgba(56, 189, 248, 0.2) 0%, rgba(59, 130, 246, 0.1) 100%);
      border-left: 3px solid #38bdf8;
      color: #38bdf8;
    }
    .modal-enter {
      animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 antialiased">
  <div id="app"></div>

  <!-- Application Logic -->
  <script src="./js/data.js"></script>
  <script src="./js/utils.js"></script>
  <script>
    const { INITIAL_AGENCIES, INITIAL_USERS, INITIAL_INSTRUMENTS, INITIAL_LOGS } = window.CalibData;
    const { getDaysUntilDue, getCalibrationAlertInfo, calculateNextDueDate, formatDate, exportToCSV, parseCSV, downloadCSVTemplate, StorageManager } = window.CalibUtils;

    class CalibGuardEnterprise {
      constructor() {
        let savedUsers = StorageManager.get('users', INITIAL_USERS);
        // Ensure Mukunda is in users list if storage is older
        if (!savedUsers.some(u => u.username === 'Mukunda')) {
          savedUsers = INITIAL_USERS;
          StorageManager.set('users', savedUsers);
        }

        this.state = {
          instruments: StorageManager.get('instruments', INITIAL_INSTRUMENTS),
          agencies: StorageManager.get('agencies', INITIAL_AGENCIES),
          users: savedUsers,
          logs: StorageManager.get('logs', INITIAL_LOGS),
          isLoggedIn: StorageManager.get('isLoggedIn', false), // Show login screen by default
          activeUserId: StorageManager.get('activeUserId', 'USR-000'),
          alertThresholdDays: StorageManager.get('alertThresholdDays', 7),
          activeTab: 'dashboard',
          searchQuery: '',
          categoryFilter: 'all',
          agencyFilter: 'all',
          statusFilter: 'all'
        };
        this.init();
      }

      init() {
        if (!this.state.isLoggedIn) {
          this.renderLoginScreen();
        } else {
          this.renderMainApp();
        }
      }

      getActiveUser() {
        return this.state.users.find(u => u.id === this.state.activeUserId) || this.state.users[0];
      }

      saveState(key) {
        StorageManager.set(key, this.state[key]);
      }

      // --- 1. AUTHENTICATION / LOGIN SYSTEM ---
      renderLoginScreen() {
        document.getElementById('app').innerHTML = `
          <div class="min-h-screen flex items-center justify-center p-4">
            <div class="glass-panel modal-enter w-full max-w-md rounded-2xl p-8 border border-slate-700 shadow-2xl space-y-6">
              <div class="text-center space-y-2">
                <div class="w-14 h-14 rounded-2xl bg-cyan-500/20 text-cyan-400 font-extrabold text-2xl mx-auto flex items-center justify-center border border-cyan-500/40">
                  CG
                </div>
                <h2 class="text-2xl font-bold text-slate-100">CalibGuard Enterprise</h2>
                <p class="text-xs text-slate-400">Measuring Instruments Calibration Portal</p>
              </div>

              <form id="loginForm" class="space-y-4 text-xs">
                <div>
                  <label class="block text-slate-300 font-semibold mb-1">Username</label>
                  <input type="text" id="loginUsername" value="Mukunda" class="glass-input w-full p-3 rounded-xl font-mono text-cyan-300" placeholder="Username (e.g. Mukunda)" required>
                </div>
                <div>
                  <label class="block text-slate-300 font-semibold mb-1">Password</label>
                  <input type="password" id="loginPassword" value="Tejas" class="glass-input w-full p-3 rounded-xl font-mono text-cyan-300" placeholder="Password (e.g. Tejas)" required>
                </div>

                <div class="p-3.5 rounded-xl bg-slate-900 border border-slate-800 text-xs text-slate-300 space-y-1.5">
                  <div class="font-bold text-cyan-400 flex items-center justify-between">
                    <span>🔑 Active Login Credentials:</span>
                    <span class="text-[10px] bg-cyan-500/20 text-cyan-300 px-2 py-0.5 rounded">Admin</span>
                  </div>
                  <div>User Name: <strong class="text-slate-100 font-mono">Mukunda</strong></div>
                  <div>Password: <strong class="text-slate-100 font-mono">Tejas</strong></div>
                </div>

                <button type="submit" class="w-full py-3.5 rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-extrabold text-sm transition-all shadow-lg shadow-cyan-500/20 flex items-center justify-center space-x-2">
                  <span>Sign In as Mukunda</span>
                </button>
              </form>
            </div>
          </div>
        `;

        document.getElementById('loginForm').addEventListener('submit', (e) => {
          e.preventDefault();
          const userVal = document.getElementById('loginUsername').value.trim();
          const passVal = document.getElementById('loginPassword').value.trim();

          const foundUser = this.state.users.find(u => 
            (u.username.toLowerCase() === userVal.toLowerCase() || u.email.toLowerCase() === userVal.toLowerCase()) && 
            u.password === passVal
          );

          if (foundUser) {
            this.state.isLoggedIn = true;
            this.state.activeUserId = foundUser.id;
            this.saveState('isLoggedIn');
            this.saveState('activeUserId');
            this.renderMainApp();
          } else {
            alert('Invalid credentials! Please use Username: Mukunda and Password: Tejas');
          }
        });
      }

      // --- 2. MAIN APPLICATION ---
      renderMainApp() {
        const user = this.getActiveUser();
        document.getElementById('app').innerHTML = `
          <!-- Header -->
          <header class="sticky top-0 z-40 glass-panel border-b border-slate-800 px-6 py-3.5 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center space-x-3">
              <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 to-blue-600 p-0.5 shadow-lg shadow-cyan-500/20">
                <div class="w-full h-full bg-slate-950 rounded-[10px] flex items-center justify-center font-bold text-cyan-400">CG</div>
              </div>
              <div>
                <h1 class="font-bold text-lg text-slate-100">CalibGuard Enterprise</h1>
                <p class="text-xs text-slate-400">Measuring Instruments Calibration System</p>
              </div>
            </div>

            <div class="flex items-center space-x-4">
              <!-- Threshold selector -->
              <div class="flex items-center space-x-2 px-3 py-1.5 rounded-xl bg-slate-900 border border-slate-800">
                <span class="text-xs text-slate-400">Alert Window:</span>
                <select id="globalThresholdSelect" class="bg-transparent text-slate-200 text-xs font-bold focus:outline-none cursor-pointer">
                  <option value="3" ${this.state.alertThresholdDays === 3 ? 'selected' : ''} class="bg-slate-900">3 Days</option>
                  <option value="7" ${this.state.alertThresholdDays === 7 ? 'selected' : ''} class="bg-slate-900">7 Days (Default)</option>
                  <option value="14" ${this.state.alertThresholdDays === 14 ? 'selected' : ''} class="bg-slate-900">14 Days</option>
                  <option value="30" ${this.state.alertThresholdDays === 30 ? 'selected' : ''} class="bg-slate-900">30 Days</option>
                </select>
              </div>

              <!-- Quick Alert Badge -->
              <button id="quickAlertBtn" class="flex items-center space-x-2 px-3.5 py-1.5 rounded-xl bg-slate-800 border border-slate-700 hover:bg-slate-700">
                <span class="text-xs font-semibold text-slate-200">${this.state.alertThresholdDays}-Day Alerts</span>
                <span id="urgentAlertCountBadge" class="px-2 py-0.5 text-xs font-bold rounded-full bg-amber-500 text-slate-950">0</span>
              </button>

              <!-- User Profile & Logout -->
              <div class="flex items-center space-x-3 pl-3 border-l border-slate-800">
                <div class="text-right hidden sm:block">
                  <div class="text-xs font-bold text-slate-100">${user.name}</div>
                  <div class="text-[10px] text-cyan-400 font-semibold">${user.role} (${user.username})</div>
                </div>
                <button id="btnLogout" class="px-3 py-1.5 rounded-xl bg-red-500/20 text-red-400 hover:bg-red-500/30 border border-red-500/40 text-xs font-semibold">
                  Logout
                </button>
              </div>
            </div>
          </header>

          <!-- Sidebar & Canvas -->
          <div class="flex min-h-[calc(100vh-65px)]">
            <aside class="w-64 glass-panel border-r border-slate-800 p-4 space-y-4 hidden lg:block shrink-0">
              <div class="space-y-1">
                <div class="px-3 py-1 text-[11px] font-semibold uppercase tracking-wider text-slate-400">Navigation</div>
                <button data-tab="dashboard" class="nav-btn w-full text-left px-3.5 py-2.5 rounded-xl text-sm font-medium transition-all hover:bg-slate-800 text-slate-300">Dashboard</button>
                <button data-tab="master" class="nav-btn w-full text-left px-3.5 py-2.5 rounded-xl text-sm font-medium transition-all hover:bg-slate-800 text-cyan-400">Master Instruments List</button>
                <button data-tab="alerts" class="nav-btn w-full text-left px-3.5 py-2.5 rounded-xl text-sm font-medium transition-all hover:bg-slate-800 text-amber-400">Alert Center</button>
                <button data-tab="agencies" class="nav-btn w-full text-left px-3.5 py-2.5 rounded-xl text-sm font-medium transition-all hover:bg-slate-800 text-slate-300">Agencies</button>
                <button data-tab="users" class="nav-btn w-full text-left px-3.5 py-2.5 rounded-xl text-sm font-medium transition-all hover:bg-slate-800 text-slate-300">User Roles</button>
              </div>

              <!-- Quick Excel Upload Box -->
              <div class="p-3.5 rounded-2xl bg-slate-900 border border-slate-800 space-y-2.5">
                <div class="text-xs font-semibold text-slate-200">Bulk Excel / CSV Upload</div>
                <input type="file" id="excelFileInput" accept=".csv" class="hidden">
                <button id="btnTriggerExcelUpload" class="w-full py-2 px-3 rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold text-xs shadow-lg shadow-cyan-500/20">
                  📁 Import Instruments CSV
                </button>
                <button id="btnDownloadTemplate" class="w-full py-1.5 text-[11px] text-cyan-400 hover:underline text-center block">
                  Download Sample CSV Template
                </button>
              </div>
            </aside>

            <main class="flex-1 p-6 max-w-7xl mx-auto space-y-6 overflow-y-auto">
              <div id="tabContent"></div>
            </main>
          </div>

          <div id="modalContainer" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-950/80 backdrop-blur-md p-4"></div>
        `;

        this.bindEvents();
        this.updateGlobalBadges();
        this.renderCurrentTab();
      }

      bindEvents() {
        document.querySelectorAll('.nav-btn').forEach(btn => {
          btn.addEventListener('click', (e) => this.switchTab(e.currentTarget.dataset.tab));
        });
        document.getElementById('quickAlertBtn')?.addEventListener('click', () => this.switchTab('alerts'));

        document.getElementById('globalThresholdSelect')?.addEventListener('change', (e) => {
          this.state.alertThresholdDays = parseInt(e.target.value, 10);
          this.saveState('alertThresholdDays');
          this.updateGlobalBadges();
          this.renderCurrentTab();
        });

        document.getElementById('btnLogout')?.addEventListener('click', () => {
          this.state.isLoggedIn = false;
          this.saveState('isLoggedIn');
          this.renderLoginScreen();
        });

        // Excel / CSV Upload Listeners
        const fileInput = document.getElementById('excelFileInput');
        document.getElementById('btnTriggerExcelUpload')?.addEventListener('click', () => fileInput.click());
        document.getElementById('btnDownloadTemplate')?.addEventListener('click', () => downloadCSVTemplate());

        fileInput?.addEventListener('change', (e) => {
          const file = e.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (evt) => {
            const csvText = evt.target.result;
            const parsedRows = parseCSV(csvText);

            if (parsedRows && parsedRows.length > 0) {
              let addedCount = 0;
              parsedRows.forEach(row => {
                if (row.TagID && row.Name) {
                  const freq = parseInt(row.FrequencyMonths || '6', 10);
                  const lastCal = row.LastCalibratedDate || '2026-01-01';
                  const nextDue = calculateNextDueDate(lastCal, freq);

                  let agency = this.state.agencies.find(a => a.code === row.AgencyCode) || this.state.agencies[0];

                  const newIns = {
                    id: `INS-${Date.now()}-${Math.floor(Math.random()*1000)}`,
                    tagId: row.TagID,
                    name: row.Name,
                    category: row.Category || 'General',
                    manufacturer: row.Manufacturer || 'Generic',
                    model: row.Model || 'M1',
                    serialNo: row.SerialNumber || 'SN-000',
                    location: row.Location || 'Plant Shop',
                    frequencyMonths: freq,
                    lastCalibratedDate: lastCal,
                    nextDueDate: nextDue,
                    agencyId: agency ? agency.id : 'AGN-001',
                    assignedUser: this.getActiveUser().name,
                    tolerance: row.Tolerance || '±0.01',
                    status: 'Active'
                  };
                  this.state.instruments.unshift(newIns);
                  addedCount++;
                }
              });

              this.saveState('instruments');
              alert(`Successfully imported ${addedCount} instruments from CSV spreadsheet!`);
              this.renderCurrentTab();
            } else {
              alert('Could not parse CSV file. Please use the sample template format!');
            }
          };
          reader.readAsText(file);
        });
      }

      updateGlobalBadges() {
        const threshold = this.state.alertThresholdDays;
        const dueUrgentCount = this.state.instruments.filter(i => { const d = getDaysUntilDue(i.nextDueDate); return d >= 0 && d <= threshold; }).length;
        const overdueCount = this.state.instruments.filter(i => getDaysUntilDue(i.nextDueDate) < 0).length;
        const total = dueUrgentCount + overdueCount;
        const badge = document.getElementById('urgentAlertCountBadge');
        if (badge) badge.innerText = total;
      }

      switchTab(tab) {
        this.state.activeTab = tab;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('nav-tab-active', b.dataset.tab === tab));
        this.renderCurrentTab();
      }

      renderCurrentTab() {
        const c = document.getElementById('tabContent');
        c.innerHTML = '';
        if (this.state.activeTab === 'master') this.renderMasterList(c);
        else if (this.state.activeTab === 'alerts') this.renderAlerts(c);
        else if (this.state.activeTab === 'agencies') this.renderAgencies(c);
        else if (this.state.activeTab === 'users') this.renderUsers(c);
        else this.renderDashboard(c);
        this.updateGlobalBadges();
      }

      // ==========================================
      // VIEW 1: DASHBOARD
      // ==========================================
      renderDashboard(c) {
        const threshold = this.state.alertThresholdDays;
        const overdue = this.state.instruments.filter(i => getDaysUntilDue(i.nextDueDate) < 0);
        const urgent = this.state.instruments.filter(i => { const d = getDaysUntilDue(i.nextDueDate); return d >= 0 && d <= threshold; });

        c.innerHTML = `
          <div class="space-y-6">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-100">Welcome, ${this.getActiveUser().name}!</h2>
                <p class="text-sm text-slate-400">Measuring Instruments Calibration System Dashboard</p>
              </div>
              <div class="px-3.5 py-1.5 rounded-xl bg-cyan-500/10 text-cyan-400 border border-cyan-500/30 text-xs font-bold w-fit">
                Logged in as: ${this.getActiveUser().name} (${this.getActiveUser().role})
              </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
              <div class="glass-panel p-4 rounded-2xl border border-slate-800">
                <div class="text-xs text-slate-400 uppercase font-semibold">Total Master Instruments</div>
                <div class="text-3xl font-extrabold text-slate-100 mt-1">${this.state.instruments.length}</div>
              </div>
              <div class="glass-panel p-4 rounded-2xl border border-red-500/30 bg-red-950/20">
                <div class="text-xs text-red-400 uppercase font-semibold">Overdue Calibrations</div>
                <div class="text-3xl font-extrabold text-red-400 mt-1">${overdue.length}</div>
              </div>
              <div class="glass-panel p-4 rounded-2xl border border-amber-500/30 bg-amber-950/20">
                <div class="text-xs text-amber-400 uppercase font-semibold">Due in ≤ ${threshold} Days</div>
                <div class="text-3xl font-extrabold text-amber-400 mt-1">${urgent.length}</div>
              </div>
              <div class="glass-panel p-4 rounded-2xl border border-emerald-500/30">
                <div class="text-xs text-emerald-400 uppercase font-semibold">Registered Agencies</div>
                <div class="text-3xl font-extrabold text-emerald-400 mt-1">${this.state.agencies.length}</div>
              </div>
            </div>
          </div>
        `;
      }

      // ==========================================
      // VIEW 2: MASTER LIST & ADD/DELETE INSTRUMENTS
      // ==========================================
      renderMasterList(c) {
        const threshold = this.state.alertThresholdDays;
        c.innerHTML = `
          <div class="space-y-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
              <div>
                <h2 class="text-2xl font-bold text-slate-100">Master Instruments Inventory</h2>
                <p class="text-sm text-slate-400">Complete master list of all measuring equipment with Add and Delete actions</p>
              </div>

              <div class="flex items-center space-x-3">
                <button id="btnAddInstrument" class="px-4 py-2 rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold text-xs shadow-lg shadow-cyan-500/20">
                  + Add New Instrument
                </button>
              </div>
            </div>

            <div class="glass-panel rounded-2xl border border-slate-800 overflow-hidden">
              <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                  <thead class="bg-slate-900/80 border-b border-slate-800 text-slate-400 uppercase text-[10px]">
                    <tr>
                      <th class="py-3 px-4">Tag ID / Name</th>
                      <th class="py-3 px-4">Category & Model</th>
                      <th class="py-3 px-4">Location</th>
                      <th class="py-3 px-4">Assigned Agency</th>
                      <th class="py-3 px-4">Last Calib</th>
                      <th class="py-3 px-4">Next Due Date</th>
                      <th class="py-3 px-4">Status</th>
                      <th class="py-3 px-4 text-right">Actions</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-slate-800/60">
                    ${this.state.instruments.map(ins => {
                      const info = getCalibrationAlertInfo(ins.nextDueDate, threshold);
                      const agency = this.state.agencies.find(a => a.id === ins.agencyId);

                      return `
                        <tr class="hover:bg-slate-800/40">
                          <td class="py-3 px-4">
                            <div class="font-bold text-slate-100">${ins.name}</div>
                            <div class="font-mono text-cyan-400 text-[10px]">${ins.tagId}</div>
                          </td>
                          <td class="py-3 px-4 text-slate-300">${ins.category}<div class="text-[10px] text-slate-400">${ins.manufacturer} ${ins.model}</div></td>
                          <td class="py-3 px-4 text-slate-300">${ins.location}</td>
                          <td class="py-3 px-4 font-semibold text-cyan-300">${agency ? agency.name : 'Unassigned'}</td>
                          <td class="py-3 px-4 text-slate-400">${formatDate(ins.lastCalibratedDate)}</td>
                          <td class="py-3 px-4 font-bold text-slate-200">${formatDate(ins.nextDueDate)}</td>
                          <td class="py-3 px-4">
                            <span class="px-2.5 py-1 rounded-full text-[10px] font-bold ${info.badgeClass}">${info.label}</span>
                          </td>
                          <td class="py-3 px-4 text-right space-x-1">
                            <button class="btnDeleteIns p-1.5 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/30" data-ins-id="${ins.id}" title="Delete Instrument">
                              🗑️ Delete
                            </button>
                          </td>
                        </tr>
                      `;
                    }).join('')}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        `;

        c.querySelector('#btnAddInstrument')?.addEventListener('click', () => this.openAddInstrumentModal());
        c.querySelectorAll('.btnDeleteIns').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const insId = e.currentTarget.dataset.insId;
            const ins = this.state.instruments.find(i => i.id === insId);
            if (confirm(`Are you sure you want to delete instrument "${ins ? ins.tagId + ' - ' + ins.name : insId}"?`)) {
              this.state.instruments = this.state.instruments.filter(i => i.id !== insId);
              this.saveState('instruments');
              this.renderCurrentTab();
            }
          });
        });
      }

      // ==========================================
      // VIEW 3: ALERT CENTER
      // ==========================================
      renderAlerts(c) {
        const threshold = this.state.alertThresholdDays;
        const overdue = this.state.instruments.filter(i => getDaysUntilDue(i.nextDueDate) < 0);
        const urgent = this.state.instruments.filter(i => { const d = getDaysUntilDue(i.nextDueDate); return d >= 0 && d <= threshold; });

        c.innerHTML = `
          <div class="space-y-6">
            <h2 class="text-2xl font-bold text-amber-400">${threshold}-Day Alert Engine Center</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              ${[...overdue, ...urgent].map(ins => {
                const info = getCalibrationAlertInfo(ins.nextDueDate, threshold);
                const agency = this.state.agencies.find(a => a.id === ins.agencyId);
                return `
                  <div class="glass-panel p-5 rounded-2xl border ${info.badgeClass} space-y-3">
                    <div class="font-mono text-xs font-bold text-cyan-300">${ins.tagId}</div>
                    <h3 class="font-bold text-base text-slate-100">${ins.name}</h3>
                    <div class="text-xs text-slate-300">Agency: <strong>${agency ? agency.name : 'Unassigned'}</strong></div>
                    <div class="text-xs text-amber-400 font-bold">Due Date: ${formatDate(ins.nextDueDate)}</div>
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `;
      }

      // ==========================================
      // VIEW 4: AGENCIES & ADD/DELETE AGENCY
      // ==========================================
      renderAgencies(c) {
        c.innerHTML = `
          <div class="space-y-6">
            <div class="flex items-center justify-between">
              <h2 class="text-2xl font-bold text-slate-100">Calibration Agencies</h2>
              <button id="btnAddAgency" class="px-4 py-2 rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold text-xs shadow-lg shadow-cyan-500/20">
                + Register New Agency
              </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              ${this.state.agencies.map(a => `
                <div class="glass-panel p-5 rounded-2xl border border-slate-800 space-y-3 flex flex-col justify-between">
                  <div class="space-y-2">
                    <div class="flex justify-between items-start">
                      <h3 class="font-bold text-lg text-slate-100">${a.name}</h3>
                      <span class="font-mono text-xs text-cyan-400 font-bold">${a.code}</span>
                    </div>
                    <div class="text-xs text-slate-400">Contact: <strong class="text-slate-200">${a.contactPerson}</strong></div>
                    <div class="text-xs text-slate-400">Email: ${a.email}</div>
                    <div class="text-xs text-cyan-400">${a.accreditation}</div>
                  </div>

                  <div class="pt-3 border-t border-slate-800 flex justify-end">
                    <button class="btnDeleteAgency px-3 py-1.5 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/30 text-xs font-semibold" data-agency-id="${a.id}">
                      🗑️ Delete Agency
                    </button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;

        c.querySelector('#btnAddAgency')?.addEventListener('click', () => this.openAddAgencyModal());
        c.querySelectorAll('.btnDeleteAgency').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const agencyId = e.currentTarget.dataset.agencyId;
            const ag = this.state.agencies.find(a => a.id === agencyId);
            if (confirm(`Are you sure you want to delete agency "${ag ? ag.name : agencyId}"?`)) {
              this.state.agencies = this.state.agencies.filter(a => a.id !== agencyId);
              this.saveState('agencies');
              this.renderCurrentTab();
            }
          });
        });
      }

      // ==========================================
      // VIEW 5: USERS & ADD/DELETE USER
      // ==========================================
      renderUsers(c) {
        c.innerHTML = `
          <div class="space-y-6">
            <div class="flex items-center justify-between">
              <h2 class="text-2xl font-bold text-slate-100">User System & Access Control</h2>
              <button id="btnAddUser" class="px-4 py-2 rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-bold text-xs shadow-lg shadow-cyan-500/20">
                + Add System User
              </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
              ${this.state.users.map(u => `
                <div class="glass-panel p-4 rounded-2xl border border-slate-800 space-y-3 flex flex-col justify-between">
                  <div class="space-y-2">
                    <div class="font-bold text-cyan-300 text-base">${u.name}</div>
                    <div class="text-xs text-slate-300">Username: <code class="text-cyan-400 font-mono">${u.username}</code></div>
                    <div class="text-xs text-slate-400">Role: <strong class="text-slate-200">${u.role}</strong></div>
                    <div class="text-xs text-slate-400">${u.department}</div>
                  </div>

                  <div class="pt-2 border-t border-slate-800 flex justify-end">
                    <button class="btnDeleteUser px-3 py-1.5 rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 border border-red-500/30 text-xs font-semibold" data-user-id="${u.id}">
                      🗑️ Delete User
                    </button>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;

        c.querySelector('#btnAddUser')?.addEventListener('click', () => this.openAddUserModal());
        c.querySelectorAll('.btnDeleteUser').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const uid = e.currentTarget.dataset.userId;
            const usr = this.state.users.find(u => u.id === uid);
            if (confirm(`Are you sure you want to delete user "${usr ? usr.name : uid}"?`)) {
              this.state.users = this.state.users.filter(u => u.id !== uid);
              this.saveState('users');
              this.renderCurrentTab();
            }
          });
        });
      }

      // --- MODALS ---
      openAddInstrumentModal() {
        const m = document.getElementById('modalContainer');
        m.classList.remove('hidden');
        m.innerHTML = `
          <div class="glass-panel modal-enter w-full max-w-md rounded-2xl p-6 border border-slate-700 space-y-4">
            <h3 class="font-bold text-lg text-slate-100">Add New Instrument</h3>
            <form id="newInsForm" class="space-y-3 text-xs">
              <input type="text" id="mTagId" value="EQ-NEW-${Math.floor(100+Math.random()*900)}" class="glass-input w-full p-2.5 rounded-xl font-mono text-cyan-400" required>
              <input type="text" id="mName" placeholder="Instrument Name (e.g. Digital Caliper)" class="glass-input w-full p-2.5 rounded-xl" required>
              <input type="text" id="mCategory" placeholder="Category (e.g. Dimensional)" class="glass-input w-full p-2.5 rounded-xl" required>
              <input type="text" id="mLocation" placeholder="Location (e.g. Bay 4)" class="glass-input w-full p-2.5 rounded-xl" required>
              <div class="grid grid-cols-2 gap-2">
                <input type="number" id="mFreq" value="6" placeholder="Months" class="glass-input w-full p-2.5 rounded-xl" required>
                <select id="mAgency" class="glass-input w-full p-2.5 rounded-xl">
                  ${this.state.agencies.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}
                </select>
              </div>
              <div class="flex justify-end space-x-2 pt-2">
                <button type="button" onclick="document.getElementById('modalContainer').classList.add('hidden')" class="px-4 py-2 rounded-xl bg-slate-800">Cancel</button>
                <button type="submit" class="px-4 py-2 rounded-xl bg-cyan-500 text-slate-950 font-bold">Save Instrument</button>
              </div>
            </form>
          </div>
        `;
        document.getElementById('newInsForm').addEventListener('submit', (e) => {
          e.preventDefault();
          const lastCal = '2026-01-18';
          const freq = parseInt(document.getElementById('mFreq').value, 10);
          const newIns = {
            id: `INS-${Date.now()}`,
            tagId: document.getElementById('mTagId').value,
            name: document.getElementById('mName').value,
            category: document.getElementById('mCategory').value,
            manufacturer: 'Generic', model: 'M1', serialNo: 'SN-900',
            location: document.getElementById('mLocation').value,
            frequencyMonths: freq,
            lastCalibratedDate: lastCal,
            nextDueDate: calculateNextDueDate(lastCal, freq),
            agencyId: document.getElementById('mAgency').value,
            status: 'Active'
          };
          this.state.instruments.unshift(newIns);
          this.saveState('instruments');
          m.classList.add('hidden');
          this.renderCurrentTab();
        });
      }

      openAddAgencyModal() {
        const m = document.getElementById('modalContainer');
        m.classList.remove('hidden');
        m.innerHTML = `
          <div class="glass-panel modal-enter w-full max-w-md rounded-2xl p-6 border border-slate-700 space-y-4">
            <h3 class="font-bold text-lg text-slate-100">Register Calibration Agency</h3>
            <form id="newAgForm" class="space-y-3 text-xs">
              <input type="text" id="agName" placeholder="Agency Name" class="glass-input w-full p-2.5 rounded-xl" required>
              <input type="text" id="agCode" placeholder="Agency Code (e.g. MCL-LAB)" class="glass-input w-full p-2.5 rounded-xl font-mono" required>
              <input type="text" id="agContact" placeholder="Contact Person" class="glass-input w-full p-2.5 rounded-xl" required>
              <input type="email" id="agEmail" placeholder="Email" class="glass-input w-full p-2.5 rounded-xl" required>
              <div class="flex justify-end space-x-2 pt-2">
                <button type="button" onclick="document.getElementById('modalContainer').classList.add('hidden')" class="px-4 py-2 rounded-xl bg-slate-800">Cancel</button>
                <button type="submit" class="px-4 py-2 rounded-xl bg-cyan-500 text-slate-950 font-bold">Register Agency</button>
              </div>
            </form>
          </div>
        `;
        document.getElementById('newAgForm').addEventListener('submit', (e) => {
          e.preventDefault();
          const newAg = {
            id: `AGN-${Date.now()}`,
            name: document.getElementById('agName').value,
            code: document.getElementById('agCode').value,
            contactPerson: document.getElementById('agContact').value,
            email: document.getElementById('agEmail').value,
            accreditation: 'ISO/IEC 17025 Accredited',
            status: 'Active'
          };
          this.state.agencies.push(newAg);
          this.saveState('agencies');
          m.classList.add('hidden');
          this.renderCurrentTab();
        });
      }

      openAddUserModal() {
        const m = document.getElementById('modalContainer');
        m.classList.remove('hidden');
        m.innerHTML = `
          <div class="glass-panel modal-enter w-full max-w-md rounded-2xl p-6 border border-slate-700 space-y-4">
            <h3 class="font-bold text-lg text-slate-100">Add System User</h3>
            <form id="newUserForm" class="space-y-3 text-xs">
              <input type="text" id="uName" placeholder="Full Name" class="glass-input w-full p-2.5 rounded-xl" required>
              <div class="grid grid-cols-2 gap-2">
                <input type="text" id="uUsername" placeholder="Username" class="glass-input w-full p-2.5 rounded-xl font-mono" required>
                <input type="password" id="uPassword" placeholder="Password" class="glass-input w-full p-2.5 rounded-xl font-mono" required>
              </div>
              <input type="email" id="uEmail" placeholder="Email" class="glass-input w-full p-2.5 rounded-xl" required>
              <select id="uRole" class="glass-input w-full p-2.5 rounded-xl">
                <option value="Admin">Admin</option>
                <option value="Technician">Technician</option>
                <option value="AgencyRep">Agency Representative</option>
                <option value="Auditor">Auditor</option>
              </select>
              <div class="flex justify-end space-x-2 pt-2">
                <button type="button" onclick="document.getElementById('modalContainer').classList.add('hidden')" class="px-4 py-2 rounded-xl bg-slate-800">Cancel</button>
                <button type="submit" class="px-4 py-2 rounded-xl bg-cyan-500 text-slate-950 font-bold">Add User</button>
              </div>
            </form>
          </div>
        `;
        document.getElementById('newUserForm').addEventListener('submit', (e) => {
          e.preventDefault();
          const name = document.getElementById('uName').value;
          const initials = name.split(' ').map(n=>n[0]).join('').toUpperCase();
          const newUser = {
            id: `USR-${Date.now()}`,
            name: name,
            username: document.getElementById('uUsername').value,
            password: document.getElementById('uPassword').value,
            email: document.getElementById('uEmail').value,
            role: document.getElementById('uRole').value,
            department: 'Metrology Dept',
            avatar: initials
          };
          this.state.users.push(newUser);
          this.saveState('users');
          m.classList.add('hidden');
          this.renderCurrentTab();
        });
      }
    }

    document.addEventListener('DOMContentLoaded', () => { window.app = new CalibGuardEnterprise(); });
  </script>
</body>
</html>
